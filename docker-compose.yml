# ============================================================
#  docker-compose.yml — RÉSERVATION DE VOITURE
#  SAM Montereau — Groupe Riva
#
#  UNE SEULE COMMANDE pour tout lancer :
#    docker-compose up --build
#
#  3 conteneurs :
#    1. db       → SQL Server avec la base de données complète
#    2. backend  → API Node.js/Express avec JWT
#    3. frontend → React servi par nginx
#
#  Accès : http://localhost:3000
# ============================================================

services:

  # ── SQL Server ──
  # Contient TOUTE la base de données : tables, PS, données
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: reservation-db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=ReservationAuto2026!
      - MSSQL_PID=Express
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
      - ./docker/init-db.sql:/docker-entrypoint-initdb/init-db.sql
      - ./docker/setup-db.sh:/docker-entrypoint-initdb/setup-db.sh
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "ReservationAuto2026!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Initialisation de la base ──
  # S'exécute UNE FOIS pour créer tables + données
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: reservation-db-init
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./docker/init-db.sql:/docker-entrypoint-initdb/init-db.sql
      - ./docker/setup-db.sh:/docker-entrypoint-initdb/setup-db.sh
    environment:
      - SA_PASSWORD=ReservationAuto2026!
    entrypoint: ["/bin/bash", "/docker-entrypoint-initdb/setup-db.sh"]
    restart: "no"

  # ── Backend API ──
  backend:
    build: ./backend
    container_name: reservation-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_SERVER=db
      - DB_DATABASE=SAM_MT_ReservationAuto
      - DB_USER=sa
      - DB_PASSWORD=ReservationAuto2026!
      - DB_PORT=1433
      - API_PORT=5000
      - JWT_SECRET=sam_montereau_reservation_voiture_secret_2026
    ports:
      - "5000:5000"

  # ── Frontend React ──
  frontend:
    build: .
    container_name: reservation-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  sqldata: